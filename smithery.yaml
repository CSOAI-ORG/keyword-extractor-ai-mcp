name: keyword-extractor-ai-mcp
description: 'Keyword Extractor Ai tools for AI agents. Capabilities: extract keywords,
  extract phrases, topic classification. Built by MEOK AI Labs.'
version: 1.0.0
tools:
- name: extract_keywords
  description: Extract top keywords using TF-IDF scoring.
  parameters:
  - name: text
    type: string
    required: true
  - name: max_keywords
    type: integer
    required: false
- name: extract_phrases
  description: Extract key phrases (2-3 word combinations).
  parameters:
  - name: text
    type: string
    required: true
  - name: max_phrases
    type: integer
    required: false
- name: topic_classification
  description: Classify text into topic categories.
  parameters:
  - name: text
    type: string
    required: true
- name: keyword_density
  description: Calculate keyword density for SEO analysis.
  parameters:
  - name: text
    type: string
    required: true
